services:
  qdrant:
    image: qdrant/qdrant
    container_name: arxiv_qdrant
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: arxiv_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: arxiv_clickhouse
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    container_name: arxiv_mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  loader:
    build: ./backend
    container_name: arxiv_loader
    command: ["python", "scripts/load_data.py", "--fake", "${LOAD_COUNT:-500}"]
    restart: "no"
    depends_on:
      qdrant:
        condition: service_started
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - HF_HOME=/hf-cache
    volumes:
      - hf_cache:/hf-cache

  backend:
    build: ./backend
    container_name: arxiv_backend
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mongo:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - HF_HOME=/hf-cache
    volumes:
      - hf_cache:/hf-cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: arxiv_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development

volumes:
  qdrant_data:
  clickhouse_data:
  mongo_data:
  hf_cache:
